<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>謎解きマップ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #fff;
    font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #toolbar {
    width: 100%;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #e8e8e8;
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #status {
    font-size: 13px;
    color: #888;
  }
  #status.selecting { color: #cc0000; font-weight: 600; }
  #clear-btn {
    font-size: 13px;
    color: #444;
    background: transparent;
    border: 1px solid #ccc;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  #clear-btn:active { background: #f0f0f0; }
  #map-wrap {
    width: 100%;
    max-width: 600px;
    padding: 8px;
  }
  #map-svg {
    width: 100%;
    height: auto;
    display: block;
    touch-action: none;
  }
  .dot-group { cursor: pointer; }
  .dot-circle {
    fill: #1a1a1a;
    stroke: white;
    stroke-width: 1.5;
    transition: r 0.1s;
  }
  .dot-group.selected .dot-circle {
    fill: #cc0000;
    r: 6;
  }
  .dot-label {
    font-size: 7px;
    fill: #111;
    text-anchor: middle;
    dominant-baseline: hanging;
    pointer-events: none;
    font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    font-weight: 600;
  }
  .conn-line {
    stroke: #cc0000;
    stroke-width: 2;
    stroke-linecap: round;
    pointer-events: none;
  }
</style>
</head>

<div id="toolbar">

  <button id="clear-btn" onclick="clearAll()">リセット</button>
</div>

];

let selected = null;
let connections = [];

const linesLayer = document.getElementById('lines-layer');
const dotsLayer = document.getElementById('dots-layer');
const statusEl = document.getElementById('status');

function renderDots() {
  dotsLayer.innerHTML = '';
  centroids.forEach(p => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'dot-group' + (selected === p.id ? ' selected' : ''));
    g.setAttribute('data-id', p.id);

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('class', 'dot-circle');
    circle.setAttribute('cx', p.cx);
    circle.setAttribute('cy', p.cy);
    circle.setAttribute('r', selected === p.id ? 6 : 4.5);
    circle.setAttribute('fill', selected === p.id ? '#cc0000' : '#1a1a1a');
    circle.setAttribute('stroke', 'white');
    circle.setAttribute('stroke-width', '1.5');

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('class', 'dot-label');
    text.setAttribute('x', p.cx);
    text.setAttribute('y', p.cy + 6);
    text.textContent = p.name;

    g.appendChild(circle);
    g.appendChild(text);

    g.addEventListener('click', () => onTap(p.id));
    g.addEventListener('touchend', (e) => { e.preventDefault(); onTap(p.id); });
    dotsLayer.appendChild(g);
  });
}

function renderLines() {
  linesLayer.innerHTML = '';
  connections.forEach(conn => {
    const a = centroids.find(p => p.id === conn[0]);
    const b = centroids.find(p => p.id === conn[1]);
    if (!a || !b) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.cx); line.setAttribute('y1', a.cy);
    line.setAttribute('x2', b.cx); line.setAttribute('y2', b.cy);
    line.setAttribute('class', 'conn-line');
    linesLayer.appendChild(line);
  });
}

function onTap(id) {
  if (selected === id) {
    selected = null;
    statusEl.textContent = '都道府県をタップして選択';
    statusEl.className = '';
    renderDots();
    return;
  }
  if (selected === null) {
    selected = id;
    const p = centroids.find(p => p.id === id);
    statusEl.textContent = '「' + p.name + '」選択中 → 次をタップ';
    statusEl.className = 'selecting';
    renderDots();
  } else {
    const key = [selected, id].sort().join('-');
    if (!connections.some(c => [...c].sort().join('-') === key)) {
      connections.push([selected, id]);
    }
    selected = null;
    statusEl.textContent = '都道府県をタップして選択';
    statusEl.className = '';
    renderLines();
    renderDots();
  }
}

function clearAll() {
  connections = [];
  selected = null;
  statusEl.textContent = '都道府県をタップして選択';
  statusEl.className = '';
  renderLines();
  renderDots();
}

renderDots();
