<title>謎解きマップ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #fff;
    font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #toolbar {
    width: 100%;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #e8e8e8;
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 100;

  #status {
    font-size: 13px;
    color: #888;
  }
  #status.selecting { color: #cc0000; font-weight: 600; }
  #clear-btn {
    font-size: 13px;
    color: #444;
    background: transparent;
    border: 1px solid #ccc;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  #clear-btn:active { background: #f0f0f0; }
  #map-wrap {
    width: 100%;
    padding: 8px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    flex: 1;
  }
  #map-svg {
    width: 100%;
    max-width: min(calc(100vw - 16px), calc(100dvh - 80px));
    height: auto;
    display: block;
    touch-action: manipulation;
  }
  .conn-line {
    stroke: #cc0000;
    stroke-width: 2;
    stroke-linecap: round;
    pointer-events: none;
  }
</style>
</head>

<script>

  {id:14, name:'神奈川県', cx:322.0, cy:397.0},
];

let selected = null;
let connections = [];

const linesLayer = document.getElementById('lines-layer');
const dotsLayer = document.getElementById('dots-layer');
const statusEl = document.getElementById('status');

function renderDots() {
  dotsLayer.innerHTML = '';
  centroids.forEach(p => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.style.cursor = 'pointer';

    const isSelected = selected === p.id;

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', p.cx);
    circle.setAttribute('cy', p.cy);
    circle.setAttribute('r', isSelected ? 6 : 4.5);
    circle.setAttribute('fill', isSelected ? '#cc0000' : '#1a1a1a');
    circle.setAttribute('stroke', 'white');
    circle.setAttribute('stroke-width', '1.5');

    // Invisible larger hit area for easy tapping
    const hitArea = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    hitArea.setAttribute('cx', p.cx);
    hitArea.setAttribute('cy', p.cy);
    hitArea.setAttribute('r', '14');
    hitArea.setAttribute('fill', 'transparent');

    g.appendChild(hitArea);
    g.appendChild(circle);
    g.addEventListener('click', () => onTap(p.id));
    g.addEventListener('touchend', (e) => { e.preventDefault(); onTap(p.id); });
    dotsLayer.appendChild(g);
  });
}

function renderLines() {
  linesLayer.innerHTML = '';
  connections.forEach(conn => {
    const a = centroids.find(p => p.id === conn[0]);
    const b = centroids.find(p => p.id === conn[1]);
    if (!a || !b) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.cx); line.setAttribute('y1', a.cy);
    line.setAttribute('x2', b.cx); line.setAttribute('y2', b.cy);
    line.setAttribute('class', 'conn-line');
    linesLayer.appendChild(line);
  });
}

function onTap(id) {
  if (selected === id) {
    selected = null;
    statusEl.textContent = '都道府県をタップして選択';
    statusEl.className = '';
    renderDots();
    return;
  }
  if (selected === null) {
    selected = id;
    statusEl.textContent = '選択中 → 次をタップ';
    statusEl.className = 'selecting';
    renderDots();
  } else {
    const key = [selected, id].sort().join('-');
    const existingIndex = connections.findIndex(c => [...c].sort().join('-') === key);
    if (existingIndex !== -1) {
      // 既存の線を削除
      connections.splice(existingIndex, 1);
    } else {
      // 新しい線を追加
      connections.push([selected, id]);
    }
    selected = null;
    statusEl.textContent = '都道府県をタップして選択';
    statusEl.className = '';
    renderLines();
    renderDots();
  }
}

function clearAll() {
  connections = [];
  selected = null;
  statusEl.textContent = '都道府県をタップして選択';
  statusEl.className = '';
  renderLines();
  renderDots();
}

renderDots();
</script>
