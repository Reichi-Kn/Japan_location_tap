<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>謎解きマップ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff;
    font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  #toolbar {
    width: 100%;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #e0e0e0;
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #status {
    font-size: 13px;
    color: #888;
    min-width: 0;
  }
  #status.selecting { color: #cc0000; font-weight: 500; }
  #clear-btn {
    font-size: 13px;
    color: #555;
    background: transparent;
    border: 1px solid #ccc;
    padding: 6px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  #clear-btn:hover { background: #f5f5f5; }
  #map-container {
    position: relative;
    width: min(820px, 96vw);
    margin: 20px auto;
  }
  #map-img {
    width: 100%;
    display: block;
    user-select: none;
    -webkit-user-select: none;
  }
  svg#lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }
  #dots-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .dot {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
  }
  .dot-inner {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #222;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px #666;
    transition: all 0.15s;
    margin: auto;
  }
  .dot:hover .dot-inner {
    background: #cc0000;
    transform: scale(1.4);
  }
  .dot.selected .dot-inner {
    background: #cc0000;
    width: 14px;
    height: 14px;
    box-shadow: 0 0 0 2.5px rgba(204,0,0,0.35);
  }
  .dot-label {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    white-space: nowrap;
    color: #222;
    pointer-events: none;
    font-weight: 600;
    text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff;
  }
  .connection-line {
    stroke: #cc0000;
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
  }
</style>
</head>
<body>

<div id="toolbar">
  <div id="status">都道府県をクリックして選択</div>
  <button id="clear-btn" onclick="clearAll()">リセット</button>
</div>

  { id:'kagawa', name:'香川', px:44.68, py:57.87 },
  { id:'ehime', name:'愛媛', px:41.55, py:60.65 },

  { id:'okinawa', name:'沖縄', px:19.21, py:87.04 },
];

let selected = null;
let connections = [];

const dotsLayer = document.getElementById('dots-layer');
const svgLines = document.getElementById('lines');
const statusEl = document.getElementById('status');
const mapImg = document.getElementById('map-img');

function renderDots() {
  dotsLayer.innerHTML = '';
  prefectures.forEach(p => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (selected === p.id ? ' selected' : '');
    dot.style.left = p.px + '%';
    dot.style.top = p.py + '%';

    const inner = document.createElement('div');
    inner.className = 'dot-inner';

    const label = document.createElement('div');
    label.className = 'dot-label';
    label.textContent = p.name;

    dot.appendChild(inner);
    dot.appendChild(label);
    dot.addEventListener('click', () => onPrefClick(p.id));
    dotsLayer.appendChild(dot);
  });
}

function renderLines() {
  svgLines.innerHTML = '';
  const w = mapImg.clientWidth;
  const h = mapImg.clientHeight;
  connections.forEach(conn => {
    const a = prefectures.find(p => p.id === conn[0]);
    const b = prefectures.find(p => p.id === conn[1]);
    if (!a || !b) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', a.px / 100 * w);
    line.setAttribute('y1', a.py / 100 * h);
    line.setAttribute('x2', b.px / 100 * w);
    line.setAttribute('y2', b.py / 100 * h);
    line.setAttribute('class','connection-line');
    svgLines.appendChild(line);
  });
}

function onPrefClick(id) {
  if (selected === id) {
    selected = null;
    statusEl.textContent = '都道府県をクリックして選択';
    statusEl.className = '';
    renderDots();
    return;
  }
  if (selected === null) {
    selected = id;
    const p = prefectures.find(p => p.id === id);
    statusEl.textContent = '「' + p.name + '」選択中 → 次をクリック';
    statusEl.className = 'selecting';
    renderDots();
  } else {
    const key = [selected, id].sort().join('-');
    if (!connections.some(c => [...c].sort().join('-') === key)) {
      connections.push([selected, id]);
    }
    selected = null;
    statusEl.textContent = '都道府県をクリックして選択';
    statusEl.className = '';
    renderLines();
    renderDots();
  }
}

function clearAll() {
  connections = [];
  selected = null;
  statusEl.textContent = '都道府県をクリックして選択';
  statusEl.className = '';
  renderLines();
  renderDots();
}

window.addEventListener('resize', renderLines);
renderDots();
</script>
